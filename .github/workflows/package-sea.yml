name: Package SEA

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'
    paths:
      - 'src/**'
      - 'scripts/build-sea.mjs'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - '.github/workflows/package-sea.yml'

permissions:
  contents: read

jobs:
  package:
    name: Package ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: windows-x64
            os: windows-latest
            artifact: blackpearl-windows-x64
            binary: dist-sea/blackpearl-win32-x64.exe
          - name: linux-x64
            os: ubuntu-latest
            artifact: blackpearl-linux-x64
            binary: dist-sea/blackpearl-linux-x64
          - name: macos-arm64
            os: macos-latest
            artifact: blackpearl-macos-arm64
            binary: dist-sea/blackpearl-darwin-arm64

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.12.1

      - name: Set up Node.js 26
        uses: actions/setup-node@v4
        with:
          node-version: 26
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm lint

      - name: Run tests
        run: pnpm test

      - name: Build SEA executable
        run: pnpm package:sea

      - name: Smoke test executable
        run: pnpm package:smoke

      - name: Package archive (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path release | Out-Null
          Copy-Item "${{ matrix.binary }}" -Destination "release\blackpearl.exe"
          Compress-Archive -Path "release\blackpearl.exe" -DestinationPath "${{ matrix.artifact }}.zip" -Force

      - name: Package archive (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          mkdir -p release
          cp "${{ matrix.binary }}" release/blackpearl
          chmod +x release/blackpearl
          tar czf ${{ matrix.artifact }}.tar.gz -C release blackpearl

      - name: Upload archive
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            ${{ matrix.artifact }}.*
          if-no-files-found: error

  release:
    name: Create Release
    needs: package
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: false

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/blackpearl-windows-x64/blackpearl-windows-x64.zip
            artifacts/blackpearl-linux-x64/blackpearl-linux-x64.tar.gz
            artifacts/blackpearl-macos-arm64/blackpearl-macos-arm64.tar.gz
          generate_release_notes: true
          fail_on_unmatched_files: true
