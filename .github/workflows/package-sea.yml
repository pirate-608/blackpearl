name: Package SEA

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'
    paths:
      - 'src/**'
      - 'scripts/build-sea.mjs'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - '.github/workflows/package-sea.yml'

permissions:
  contents: read

jobs:
  package:
    name: Package ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: windows-x64
            os: windows-latest
            artifact: blackpearl-windows-x64
            binary: dist-sea/blackpearl-win32-x64.exe
          - name: linux-x64
            os: ubuntu-latest
            artifact: blackpearl-linux-x64
            binary: dist-sea/blackpearl-linux-x64
          - name: macos-arm64
            os: macos-latest
            artifact: blackpearl-macos-arm64
            binary: dist-sea/blackpearl-darwin-arm64

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.12.1

      - name: Set up Node.js 26
        uses: actions/setup-node@v4
        with:
          node-version: 26
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm lint

      - name: Run tests
        run: pnpm test

      - name: Build SEA executable
        run: pnpm package:sea

      - name: Smoke test executable
        run: pnpm package:smoke

      - name: Package archive (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path release | Out-Null
          Copy-Item "${{ matrix.binary }}" -Destination "release\blackpearl.exe"
          Compress-Archive -Path "release\blackpearl.exe" -DestinationPath "${{ matrix.artifact }}.zip" -Force

      - name: Package archive (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          mkdir -p release
          cp "${{ matrix.binary }}" release/blackpearl
          chmod +x release/blackpearl
          tar czf ${{ matrix.artifact }}.tar.gz -C release blackpearl

      - name: Upload archive
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            ${{ matrix.artifact }}.*
          if-no-files-found: error

  release:
    name: Create Release
    needs: package
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: false

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/blackpearl-windows-x64/blackpearl-windows-x64.zip
            artifacts/blackpearl-linux-x64/blackpearl-linux-x64.tar.gz
            artifacts/blackpearl-macos-arm64/blackpearl-macos-arm64.tar.gz
          generate_release_notes: true
          fail_on_unmatched_files: true

  deploy-pages:
    name: Deploy to GitHub Pages
    needs: release
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: false

      - name: Prepare pages directory
        run: |
          mkdir -p pages
          cp artifacts/blackpearl-windows-x64/blackpearl-windows-x64.zip pages/
          cp artifacts/blackpearl-linux-x64/blackpearl-linux-x64.tar.gz pages/
          cp artifacts/blackpearl-macos-arm64/blackpearl-macos-arm64.tar.gz pages/

          # Create landing page
          cat > pages/index.html << 'HTML'
          <!DOCTYPE html>
          <html lang="zh">
          <head>
            <meta charset="UTF-8">
            <title>blackpearl-agent</title>
            <style>
              body { font-family: system-ui, sans-serif; max-width: 720px; margin: 4em auto; padding: 0 1em; }
              code { background: #f0f0f0; padding: 0.2em 0.4em; border-radius: 3px; }
              pre { background: #f4f4f4; padding: 1em; border-radius: 6px; overflow-x: auto; }
              a { color: #06c; }
            </style>
          </head>
          <body>
            <h1>blackpearl-agent</h1>
            <p>TypeScript + Ink TUI 多厂商 AI Agent 框架。独立可执行文件，无需安装 Node.js。</p>

            <h2>一键安装</h2>
            <p><strong>Windows（PowerShell）：</strong></p>
            <pre>irm https://pirate-608.github.io/blackpearl/install.ps1 | iex</pre>
            <p><strong>Linux / macOS（Bash）：</strong></p>
            <pre>curl -fsSL https://pirate-608.github.io/blackpearl/install.sh | bash</pre>

            <h2>手动下载</h2>
            <ul>
              <li><a href="blackpearl-windows-x64.zip">Windows x64 (.zip)</a></li>
              <li><a href="blackpearl-linux-x64.tar.gz">Linux x64 (.tar.gz)</a></li>
              <li><a href="blackpearl-macos-arm64.tar.gz">macOS arm64 (.tar.gz)</a></li>
            </ul>

            <p><a href="https://github.com/pirate-608/blackpearl">GitHub 仓库 →</a></p>
          </body>
          </html>
          HTML

          # Copy install scripts so they're also served
          cp scripts/install.ps1 pages/
          cp scripts/install.sh pages/

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./pages
          publish_branch: gh-pages
          force_orphan: true
