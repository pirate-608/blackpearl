<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- 定义裁剪路径：最大内切圆（半径为 256，圆心 256,256） -->
  <defs>
    <clipPath id="circleClip">
      <circle cx="256" cy="256" r="256"/>
    </clipPath>
  </defs>

  <!-- 透明背景 + 圆形白色背景区域（通过 clip-path 实现内切圆） -->
  <g clip-path="url(#circleClip)">
    <!-- 白色圆形背景（在裁剪区域内显示） -->
    <rect width="512" height="512" fill="#FFFFFF"/>
  </g>

  <!-- 黑色船形剪影（整体上移，视觉居中） -->
  <svg viewBox="0 0 200 200" x="46" y="66" width="420" height="420">

    <g fill="#000000" fill-rule="nonzero">

      <!-- === 1. 船身 === -->
      <path d="
        M 24 132
        L 24 132
        Q 24 160 40 164
        Q 70 180 100 180
        Q 130 180 160 164
        Q 176 160 176 132
        Z
      "/>

      <!-- 船尾装饰 -->
      <rect x="18" y="118" width="16" height="18" rx="2" />

      <!-- === 2. 船首斜桅 === -->
      <path d="M 176 132 L 204 104" stroke="#000000" stroke-width="5" stroke-linecap="round" fill="none"/>
      <path d="M 176 132 Q 184 132 204 104 Q 188 136 176 132 Z" />

      <!-- === 3. 三根桅杆 === -->
      <!-- 前桅 -->
      <line x1="76" y1="132" x2="76" y2="40" stroke="#000000" stroke-width="6" stroke-linecap="round"/>
      <!-- 主桅 -->
      <line x1="100" y1="132" x2="100" y2="24" stroke="#000000" stroke-width="7" stroke-linecap="round"/>
      <!-- 后桅 -->
      <line x1="132" y1="132" x2="132" y2="52" stroke="#000000" stroke-width="6" stroke-linecap="round"/>

      <!-- === 4. 横桁 === -->
      <!-- 前桅 -->
      <line x1="58" y1="68" x2="94" y2="68" stroke="#000000" stroke-width="4" stroke-linecap="round"/>
      <line x1="62" y1="90" x2="90" y2="90" stroke="#000000" stroke-width="4" stroke-linecap="round"/>
      <!-- 主桅 -->
      <line x1="80" y1="50" x2="120" y2="50" stroke="#000000" stroke-width="4" stroke-linecap="round"/>
      <line x1="84" y1="72" x2="116" y2="72" stroke="#000000" stroke-width="4" stroke-linecap="round"/>
      <line x1="86" y1="34" x2="114" y2="34" stroke="#000000" stroke-width="3" stroke-linecap="round"/>
      <!-- 后桅 -->
      <line x1="116" y1="76" x2="148" y2="76" stroke="#000000" stroke-width="4" stroke-linecap="round"/>
      <line x1="120" y1="98" x2="144" y2="98" stroke="#000000" stroke-width="4" stroke-linecap="round"/>

      <!-- === 5. 风帆 === -->
      <!-- 前桅 -->
      <path d="M 76 132 L 58 68 Q 76 84 76 68 L 76 40 Q 76 84 94 68 Z" />
      <path d="M 76 132 L 62 90 Q 76 104 76 90 L 76 68 Q 76 104 90 90 Z" />
      <!-- 主桅 -->
      <path d="M 100 132 L 80 50 Q 100 70 100 50 L 100 24 Q 100 70 120 50 Z" />
      <path d="M 100 132 L 84 72 Q 100 92 100 72 L 100 50 Q 100 92 116 72 Z" />
      <path d="M 100 72 L 86 34 Q 100 48 100 34 L 100 24 Q 100 48 114 34 Z" />
      <!-- 后桅 -->
      <path d="M 132 132 L 116 76 Q 132 94 132 76 L 132 52 Q 132 94 148 76 Z" />
      <path d="M 132 132 L 120 98 Q 132 110 132 98 L 132 76 Q 132 110 144 98 Z" />

      <!-- === 6. 船首像 === -->
      <path d="M 176 132 Q 182 122 186 116" stroke="#000000" stroke-width="4" stroke-linecap="round" fill="none"/>
      <circle cx="186" cy="116" r="3" fill="#FFFFFF" />

      <!-- === 7. 水纹线 === -->
      <path d="M 32 168 Q 52 162 72 168 Q 92 174 112 168 Q 132 162 152 168 Q 172 174 188 168"
            stroke="#000000" stroke-width="3" stroke-linecap="round" fill="none"/>

    </g>
  </svg>
</svg>