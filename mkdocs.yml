site_name: blackpearl-agent Documentation
site_description: TypeScript TUI AI Agent course project documentation.
repo_url: ""
docs_dir: docs
site_dir: site
theme:
  name: mkdocs
  locale: zh
nav:
  - 首页: index.md
  - 快速开始: usage.md
  - 功能与特性: features.md
  - 架构设计: architecture.md
  - 技术接口: interfaces.md
  - 开发与测试: development.md
  - 课程方案: recommended-solution.md
  - 基础构建说明: implementation-notes.md
  - 作业原始要求: raw-instruction.md
markdown_extensions:
  - admonition
  - toc:
      permalink: true
  - tables
  - fenced_code
  - codehilite
strict: true
