site_name: blackpearl-agent
site_description: 一个基于 TypeScript、Ink TUI 和多厂商模型后端的教学型 AI Agent 框架
site_url: https://blackpearl.67656.fun/
repo_url: https://github.com/pirate-608/blackpearl
repo_name: pirate-608/blackpearl
edit_uri: edit/main/docs/

docs_dir: docs
site_dir: site

theme:
  name: material
  language: zh
  palette:
    - scheme: default
      primary: cyan
      accent: deep orange
      toggle:
        icon: material/brightness-7
        name: 切换至深色模式
    - scheme: slate
      primary: cyan
      accent: deep orange
      toggle:
        icon: material/brightness-4
        name: 切换至浅色模式
  font:
    text: Roboto
    code: Roboto Mono
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.tabs
    - navigation.top
    - navigation.indexes
    - search.suggest
    - search.highlight
    - content.code.annotate
    - content.code.copy
  icon:
    repo: fontawesome/brands/github

nav:
  - 首页: index.md
  - 快速开始: usage.md
  - 功能与特性: features.md
  - 架构设计: architecture.md
  - 技术接口: interfaces.md
  - 开发与测试: development.md
  - 课程方案: recommended-solution.md
  - 基础构建说明: implementation-notes.md
  - 作业原始要求: raw-instruction.md

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.caret
  - pymdownx.mark
  - pymdownx.tilde
  - pymdownx.tasklist
  - toc:
      permalink: true
  - tables
  - attr_list
  - md_in_html

strict: true
